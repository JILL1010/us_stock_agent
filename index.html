<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华尔街 AI 监察智能体 | 终端</title>
    <!-- 引入 marked.js，用来把 AI 的 Markdown 转换成漂亮的网页排版 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-accent: #58a6ff;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard {
            width: 100%;
            max-width: 800px;
        }
        .header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--text-accent);
            margin: 0 0 10px 0;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #444; cursor: not-allowed; }
        .btn-download { background-color: #1f6feb; }
        .btn-download:hover { background-color: #388bfd; }
        
        #report-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            line-height: 1.6;
            min-height: 400px;
        }
        /* 美化 Markdown 渲染后的元素 */
        #report-container h1, #report-container h2, #report-container h3 { color: var(--text-accent); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        #report-container ul { padding-left: 20px; }
        #report-container strong { color: #fff; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>🦅 宏观金融监察 Agent</h1>
        <p>全天候美股数据监控与流动性风险评估系统</p>
    </div>

    <div class="controls">
        <div id="status-text">状态：等待连接后端大脑...</div>
        <div>
            <button id="btn-generate" onclick="generateNewReport()">⚡ 强制执行巡逻 (重新生成)</button>
            <button id="btn-download" class="btn-download" onclick="downloadReport()" style="display: none;">⬇️ 导出 Markdown 研报</button>
        </div>
    </div>

    <div id="report-container">
        <!-- 报告内容会渲染在这里 -->
        <div style="text-align: center; color: #8b949e; margin-top: 100px;">
            <p>正在拉取今日最新研报...</p>
        </div>
    </div>
</div>

<script>
    let currentRawReport = ""; // 用来保存原始 Markdown 文字，方便下载

    // 网页一打开，立刻去拉取今天的最新报告
    window.onload = async function() {
        await fetchLatestReport();
    };

    async function fetchLatestReport() {
        const container = document.getElementById('report-container');
        const statusText = document.getElementById('status-text');
        
        try {
            const response = await fetch('https://us-stock-agent.onrender.com/latest_report');
            const data = await response.json();

            if (data.status === "success") {
                currentRawReport = data.report;
                // 使用 marked.js 把 Markdown 渲染成 HTML
                container.innerHTML = marked.parse(data.report);
                statusText.innerHTML = "🟢 系统在线 | 今日报告已就绪";
                document.getElementById('btn-download').style.display = "inline-block";
            } else {
                container.innerHTML = `<p style="color:#ff7b72;">${data.message}</p>`;
                statusText.innerHTML = "🟡 待命 | 尚未生成今日报告";
            }
        } catch (error) {
            container.innerHTML = `<p style="color:#ff7b72;">❌ 无法连接到本地大模型后端。请确保 uvicorn 服务器已启动。</p>`;
            statusText.innerHTML = "🔴 离线 | 后端连接失败";
        }
    }

    async function generateNewReport() {
        const btn = document.getElementById('btn-generate');
        const container = document.getElementById('report-container');
        const statusText = document.getElementById('status-text');
        
        btn.disabled = true;
        btn.innerText = "⏳ Agent 正在分析数据...";
        container.innerHTML = `<div style="text-align: center; margin-top: 100px;"><h3>📡 正在呼叫华尔街底层接口并连接 DeepSeek 大脑...</h3><p>预计需要 10-20 秒，请耐心等待。</p></div>`;
        document.getElementById('btn-download').style.display = "none";

        try {
            const response = await fetch('https://us-stock-agent.onrender.com/generate_now');
            const data = await response.json();

            if (data.status === "success") {
                currentRawReport = data.report;
                container.innerHTML = marked.parse(data.report);
                statusText.innerHTML = `🟢 系统在线 | 报告生成于: ${data.date}`;
                document.getElementById('btn-download').style.display = "inline-block";
            }
        } catch (error) {
            container.innerHTML = `<p style="color:#ff7b72;">❌ 生成失败: ${error.message}</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "⚡ 强制执行巡逻 (重新生成)";
        }
    }

    // 神级功能：一键将浏览器内存中的文本，打包成 .md 文件下载到电脑里
    function downloadReport() {
        if (!currentRawReport) return;
        
        // 创建一个包含报告内容的虚拟文件 (Blob)
        const blob = new Blob([currentRawReport], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        // 创建一个隐藏的 a 标签，模拟点击下载
        const a = document.createElement('a');
        a.href = url;
        const today = new Date().toISOString().split('T')[0];
        a.download = `华尔街AI研报_${today}.md`; 
        document.body.appendChild(a);
        a.click();
        
        // 清理痕迹
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
